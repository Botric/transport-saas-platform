version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Quick-start:
#   1. Copy docker/.env.example to docker/.env and fill in values.
#   2. Set APP_URL (e.g. APP_URL=https://tango.example.com).
#   3. Run:  APP_URL=https://tango.example.com ./scripts/build-apks.sh
#      (builds driver + passenger APKs into docker/apks/)
#   4. docker-compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: tango_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-transport_saas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend/api
      dockerfile: Dockerfile
    container_name: tango_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-transport_saas}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ACTIVATION_TOKEN_SECRET: ${ACTIVATION_TOKEN_SECRET:-change-this-too-in-production}
      ACTIVATION_TOKEN_EXPIRES_IN: ${ACTIVATION_TOKEN_EXPIRES_IN:-12h}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${APP_URL:-http://localhost}/payment/success
      STRIPE_CANCEL_URL: ${APP_URL:-http://localhost}/payment/cancel
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
    expose:
      - "3000"

  portal:
    build:
      context: ../apps/web-portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL:-http://localhost}/api
    container_name: tango_portal
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      # Serve pre-built APKs from docker/apks/ at /apks/ URL path
      - ./apks:/usr/share/nginx/html/apks:ro
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  pgdata:
