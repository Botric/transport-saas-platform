version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: tango_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-transport_saas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend/api
      dockerfile: Dockerfile
    container_name: tango_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-transport_saas}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ACTIVATION_TOKEN_SECRET: ${ACTIVATION_TOKEN_SECRET:-change-this-too-in-production}
      ACTIVATION_TOKEN_EXPIRES_IN: ${ACTIVATION_TOKEN_EXPIRES_IN:-12h}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

  # Optional: serve the pre-built web portal via Nginx
  # Uncomment after running: cd apps/web-portal && npm run build
  # portal:
  #   image: nginx:alpine
  #   container_name: tango_portal
  #   restart: unless-stopped
  #   depends_on:
  #     - api
  #   volumes:
  #     - ../apps/web-portal/dist:/usr/share/nginx/html:ro
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   ports:
  #     - "80:80"

volumes:
  pgdata:
